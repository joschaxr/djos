services:
  postgres:
    image: postgres:16
    container_name: djos-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: djos
      POSTGRES_PASSWORD: djos
      POSTGRES_DB: djos

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: